name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: npm
      url: https://www.npmjs.com/package/@orygn/opa-mcp
    permissions:
      # `id-token: write` lets npm exchange the GitHub Actions OIDC
      # token for a short-lived publish token, per the Trusted
      # Publisher configured at
      # https://www.npmjs.com/package/@orygn/opa-mcp/access.
      # No NPM_TOKEN secret is read; setting NODE_AUTH_TOKEN at all
      # would disable OIDC, so it is deliberately absent.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      # OIDC trusted-publisher auth requires npm CLI >= 11.5.1; the
      # version bundled with Node 20 (npm 10.x) only does provenance,
      # not the trusted-publisher token exchange, and the publish PUT
      # falls back to the placeholder _authToken setup-node writes,
      # which the registry answers with a 404.
      - run: npm install -g npm@latest
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run build
      - name: Publish via OIDC (provenance auto-attached)
        run: npm publish --access public

  publish-docker:
    name: Build & push multi-arch Docker image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: orygn/opa-mcp
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-mcpb:
    name: Build MCPB bundle
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run build
      - name: Prune to production dependencies
        run: npm prune --omit=dev
      - name: Stage bundle
        run: |
          set -eux
          mkdir -p bundle/server
          cp -r dist bundle/server/dist
          cp package.json bundle/server/package.json
          cp -r node_modules bundle/server/node_modules
          cp manifest.json bundle/manifest.json
          cp README.md bundle/README.md
          cp LICENSE bundle/LICENSE
      - name: Pack .mcpb (zip)
        run: |
          cd bundle
          zip -r ../opa-mcp.mcpb . -x "*.DS_Store" "Thumbs.db"
      - name: Compute sha256
        run: |
          sha256sum opa-mcp.mcpb > opa-mcp.mcpb.sha256
          cat opa-mcp.mcpb.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: mcpb-bundle
          path: |
            opa-mcp.mcpb
            opa-mcp.mcpb.sha256
          retention-days: 30

  publish-smithery:
    name: Publish to Smithery
    runs-on: ubuntu-latest
    needs: build-mcpb
    environment:
      name: smithery
      url: https://smithery.ai/server/@orygn/opa-mcp
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mcpb-bundle
      - name: Install Smithery CLI
        run: npm install -g @smithery/cli
      - name: Publish bundle
        run: smithery mcp publish ./opa-mcp.mcpb -n @orygn/opa-mcp
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-docker, build-mcpb, publish-smithery]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcpb-bundle
      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "## What's new in ${GITHUB_REF_NAME}"
            echo ""
            awk "/^\#\# \[${VERSION}\]/{found=1; next} found && /^\#\# \[/{exit} found{print}" CHANGELOG.md
          } > release-notes.md
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            opa-mcp.mcpb
            opa-mcp.mcpb.sha256
