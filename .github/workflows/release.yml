name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: npm
      url: https://www.npmjs.com/package/@orygn/opa-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - name: Publish (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Build & push multi-arch Docker image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: orygnscode/opa-mcp
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-mcpb:
    name: Build MCPB bundle
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Prune to production dependencies
        run: npm prune --omit=dev
      - name: Stage bundle
        run: |
          set -eux
          mkdir -p bundle/server
          cp -r dist bundle/server/dist
          cp package.json bundle/server/package.json
          cp -r node_modules bundle/server/node_modules
          cp manifest.json bundle/manifest.json
          cp README.md bundle/README.md
          cp LICENSE bundle/LICENSE
      - name: Pack .mcpb (zip)
        run: |
          cd bundle
          zip -r ../opa-mcp.mcpb . -x "*.DS_Store" "Thumbs.db"
      - name: Compute sha256
        run: |
          sha256sum opa-mcp.mcpb > opa-mcp.mcpb.sha256
          cat opa-mcp.mcpb.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: mcpb-bundle
          path: |
            opa-mcp.mcpb
            opa-mcp.mcpb.sha256
          retention-days: 30

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-docker, build-mcpb]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcpb-bundle
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            opa-mcp.mcpb
            opa-mcp.mcpb.sha256
