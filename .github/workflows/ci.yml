name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  unit-tests:
    name: Unit tests (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22, 24]
        include:
          - os: macos-latest
            node: 22
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm test -- --reporter=verbose

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      OPA_VERSION: '0.69.0'
      REGAL_VERSION: '0.30.0'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      # The coverage run includes integration tests (via
      # vitest.coverage.config.ts) so the report reflects every test
      # that actually exercises src/. That requires opa and regal on
      # PATH — install pinned versions before running coverage.
      - name: Install OPA
        run: |
          curl -fsSL -o /tmp/opa \
            "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static"
          sudo install -m 0755 /tmp/opa /usr/local/bin/opa
          opa version
      - name: Install Regal
        run: |
          curl -fsSL -o /tmp/regal \
            "https://github.com/StyraInc/regal/releases/download/v${REGAL_VERSION}/regal_Linux_x86_64"
          sudo install -m 0755 /tmp/regal /usr/local/bin/regal
          regal version
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          retention-days: 7

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build
    env:
      OPA_VERSION: '0.69.0'
      REGAL_VERSION: '0.30.0'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install OPA
        run: |
          curl -fsSL -o /tmp/opa \
            "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static"
          sudo install -m 0755 /tmp/opa /usr/local/bin/opa
          opa version
      - name: Install Regal
        run: |
          curl -fsSL -o /tmp/regal \
            "https://github.com/StyraInc/regal/releases/download/v${REGAL_VERSION}/regal_Linux_x86_64"
          sudo install -m 0755 /tmp/regal /usr/local/bin/regal
          regal version
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run build
      - run: npm run test:integration
