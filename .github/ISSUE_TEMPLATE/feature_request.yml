name: Feature request
description: Suggest a new tool, prompt, resource, or capability
title: '[Feature] '
labels: ['enhancement', 'triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what's painful about the current behavior?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the MCP do? Include the proposed tool / prompt / resource name.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: Show how an agent would call it.
      render: text
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
